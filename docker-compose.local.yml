services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chatgpt2api:local
    container_name: chatgpt2api-local
    ports:
      - "8000:80"
    volumes:
      - ./data:/app/data
      - .:/config
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
      CHATGPT2API_CONFIG_FILE: /config/config.yaml
      CHATGPT2API_EXAMPLE_CONFIG_FILE: /config/config.example.yaml
